<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Turbine Gallery</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		:root {
			--panel: rgba(255, 255, 255, 0.92);
			--ink: #102033;
			--accent: #0f766e;
			--accent-2: #2563eb;
		}

		body {
			background:
				radial-gradient(circle at top left, rgba(37, 99, 235, 0.24), transparent 32%),
				radial-gradient(circle at top right, rgba(15, 118, 110, 0.18), transparent 26%),
				linear-gradient(180deg, #eef4ff 0%, #eef8f7 100%);
			color: var(--ink);
		}

		.turbine-card {
			transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background-color 180ms ease;
		}

		.turbine-card:hover {
			transform: translateY(-4px);
			box-shadow: 0 18px 40px rgba(16, 32, 51, 0.16);
			border-color: rgba(37, 99, 235, 0.45);
		}

		.state-pill {
			min-width: 3.5rem;
		}

		.status-output {
			white-space: pre-wrap;
		}

		.send-button:disabled {
			opacity: 0.65;
			cursor: not-allowed;
		}

		.turbine-slider {
			width: 100%;
			height: 10px;
			border-radius: 999px;
			outline: none;
			appearance: none;
			-webkit-appearance: none;
			background: #d1d5db;
		}

		.turbine-slider::-webkit-slider-thumb {
			-webkit-appearance: none;
			appearance: none;
			width: 18px;
			height: 18px;
			border-radius: 999px;
			background: #0f172a;
			cursor: pointer;
			border: 2px solid #ffffff;
		}

		.turbine-slider::-moz-range-thumb {
			width: 18px;
			height: 18px;
			border-radius: 999px;
			background: #0f172a;
			cursor: pointer;
			border: 2px solid #ffffff;
		}

		.panel-glass {
			background: var(--panel);
			backdrop-filter: blur(16px);
		}
	</style>
</head>
	<body class="min-h-screen">
	<main class="mx-auto flex min-h-screen w-full max-w-7xl items-center px-4 py-8 sm:px-6 lg:px-8">
		<section class="grid w-full gap-6 lg:grid-cols-[1fr_3fr]">
			<div class="panel-glass rounded-3xl border border-white/70 p-5 shadow-[0_20px_70px_rgba(16,32,51,0.14)] sm:p-8">
				<div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
					<div>
						<p class="text-sm font-semibold uppercase tracking-[0.22em] text-teal-700">Interactive turbine gallery</p>
					</div>
				</div>

				<div class="grid gap-2">
					<div class="turbine-card rounded-2xl border p-2" data-name="Turbine 1">
						<div class="flex items-center justify-between gap-2">
							<p class="text-xs font-semibold text-slate-700">Turbine 1</p>
							<span class="state-pill px-2 py-1 text-xs font-semibold text-slate-700">0%</span>
						</div>
						<div class="mt-2">
							<input class="turbine-slider" type="range" min="0" max="100" value="0" data-name="Turbine 1" aria-label="Turbine 1" />
						</div>
					</div>

					<div class="turbine-card rounded-2xl border p-2" data-name="Turbine 2">
						<div class="flex items-center justify-between gap-2">
							<p class="text-xs font-semibold text-slate-700">Turbine 2</p>
							<span class="state-pill px-2 py-1 text-xs font-semibold text-slate-700">0%</span>
						</div>
						<div class="mt-2">
							<input class="turbine-slider" type="range" min="0" max="100" value="0" data-name="Turbine 2" aria-label="Turbine 2" />
						</div>
					</div>

					<div class="turbine-card rounded-2xl border p-2" data-name="Turbine 3">
						<div class="flex items-center justify-between gap-2">
							<p class="text-xs font-semibold text-slate-700">Turbine 3</p>
							<span class="state-pill px-2 py-1 text-xs font-semibold text-slate-700">0%</span>
						</div>
						<div class="mt-2">
							<input class="turbine-slider" type="range" min="0" max="100" value="0" data-name="Turbine 3" aria-label="Turbine 3" />
						</div>
					</div>

					<div class="turbine-card rounded-2xl border p-2" data-name="Turbine 4">
						<div class="flex items-center justify-between gap-2">
							<p class="text-xs font-semibold text-slate-700">Turbine 4</p>
							<span class="state-pill px-2 py-1 text-xs font-semibold text-slate-700">0%</span>
						</div>
						<div class="mt-2">
							<input class="turbine-slider" type="range" min="0" max="100" value="0" data-name="Turbine 4" aria-label="Turbine 4" />
						</div>
					</div>

					<div class="turbine-card rounded-2xl border p-2" data-name="Turbine 5">
						<div class="flex items-center justify-between gap-2">
							<p class="text-xs font-semibold text-slate-700">Turbine 5</p>
							<span class="state-pill px-2 py-1 text-xs font-semibold text-slate-700">0%</span>
						</div>
						<div class="mt-2">
							<input class="turbine-slider" type="range" min="0" max="100" value="0" data-name="Turbine 5" aria-label="Turbine 5" />
						</div>
					</div>
				</div>
                <br>
				<button id="sendStatesButton" type="button" class="send-button rounded-xl bg-teal-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-teal-700">Send states</button>

			</div>

			<aside class="panel-glass rounded-3xl border border-white/70 p-5 shadow-[0_20px_70px_rgba(16,32,51,0.14)] sm:p-6">
				<p class="text-sm font-semibold uppercase tracking-[0.22em] text-sky-700">Status box</p>
				<div class="mt-4 rounded-2xl border border-slate-200 bg-slate-50 p-5">
					<p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">Last action</p>
					<p id="messageBox" class="mt-3 text-lg font-semibold text-slate-900">Move a slider to set a turbine power from 0% to 100%.</p>
				</div>
				<div class="mt-4 rounded-2xl bg-gradient-to-br from-teal-600 to-sky-600 p-5 text-white">
					<p class="text-sm font-semibold uppercase tracking-[0.2em] text-white/80">API response</p>
					<p id="statusOutput" class="status-output mt-2 text-sm leading-6 text-white/90">The server response will appear here after you press Send states.</p>
				</div>
			</aside>
		</section>
	</main>

	<!-- WEB_APP_SCRIPT -->
</body>
</html>
